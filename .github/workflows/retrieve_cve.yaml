name: Daily Retrieve CVE

on:
  schedule:
    - cron: '10 0 * * *'
  workflow_dispatch: # Allows manual triggering

jobs:
  retrieve_cve:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Retrieve CVE
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: python retrieve_cve.py

      - name: Commit and push lastUpdate.txt
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@users.noreply.github.com"
          git add lastUpdate.txt
          git diff --staged --quiet && exit 0
          git commit -m "Retrieve new CVEs"
          for i in 1 2 3 4 5; do
            git pull --rebase origin main && git push && exit 0
            echo "Push attempt $i failed, retrying..."
            sleep $((i * 3))
          done
          exit 1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload new_cves.jsonl artifact
        uses: actions/upload-artifact@v4
        with:
          name: new-cves-initial
          path: results/new_cves.jsonl
          retention-days: 1

  retrieve_cwe:
    runs-on: ubuntu-latest
    needs: retrieve_cve

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download new_cves.jsonl artifact
        uses: actions/download-artifact@v4
        with:
          name: new-cves-initial
          path: results/

      - name: Retrieve CWE
        run: python cve2cwe.py

      - name: Upload new_cves.jsonl artifact
        uses: actions/upload-artifact@v4
        with:
          name: new-cves-cwe
          path: results/new_cves.jsonl
          retention-days: 1

  retrieve_capec:
    runs-on: ubuntu-latest
    needs: retrieve_cwe

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download new_cves.jsonl artifact
        uses: actions/download-artifact@v4
        with:
          name: new-cves-cwe
          path: results/

      - name: Retrieve CAPEC
        run: python cwe2capec.py

      - name: Upload new_cves.jsonl artifact
        uses: actions/upload-artifact@v4
        with:
          name: new-cves-capec
          path: results/new_cves.jsonl
          retention-days: 1

  retrieve_techniques:
    runs-on: ubuntu-latest
    needs: retrieve_capec

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download new_cves.jsonl artifact
        uses: actions/download-artifact@v4
        with:
          name: new-cves-capec
          path: results/

      - name: Retrieve TECHNIQUES
        run: python capec2technique.py

      - name: Commit and push database updates
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@users.noreply.github.com"
          git add database/*.jsonl
          git diff --staged --quiet && exit 0
          git commit -m "Retrieve new CVEs and update CVE DB"
          for i in 1 2 3 4 5; do
            git pull --rebase origin main && git push && exit 0
            echo "Push attempt $i failed, retrying..."
            sleep $((i * 3))
          done
          exit 1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload new_cves.jsonl artifact
        uses: actions/upload-artifact@v4
        with:
          name: new-cves-techniques
          path: results/new_cves.jsonl
          retention-days: 1

  retrieve_defend:
    runs-on: ubuntu-latest
    needs: retrieve_techniques

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download new_cves.jsonl artifact
        uses: actions/download-artifact@v4
        with:
          name: new-cves-techniques
          path: results/

      - name: Retrieve D3FEND mappings from TECHNIQUES
        run: python technique2defend.py

      - name: Commit and push database updates
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@users.noreply.github.com"
          git add database/*.jsonl
          git diff --staged --quiet && exit 0
          git commit -m "Add D3FEND mappings for new CVEs"
          for i in 1 2 3 4 5; do
            git pull --rebase origin main && git push && exit 0
            echo "Push attempt $i failed, retrying..."
            sleep $((i * 3))
          done
          exit 1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
